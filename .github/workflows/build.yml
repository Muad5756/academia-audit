name: Build AcademiaAudit.dylib

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14        # Apple Silicon — compiles arm64 natively

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ldid
        run: brew install ldid

      - name: Show SDK path
        run: xcrun --sdk iphoneos --show-sdk-path

      - name: Compile AcademiaAudit.dylib
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)

          xcrun --sdk iphoneos clang \
            -arch arm64 \
            -isysroot "$SDK" \
            -miphoneos-version-min=14.0 \
            -shared \
            -fmodules \
            -fobjc-arc \
            -O2 \
            -framework Foundation \
            -framework UIKit \
            -framework Security \
            -lobjc \
            fishhook.c \
            AcademiaAudit.m \
            -o AcademiaAudit.dylib

      - name: Fake-sign with ldid
        run: ldid -S AcademiaAudit.dylib

      - name: Verify binary
        run: |
          file AcademiaAudit.dylib
          ls -lh AcademiaAudit.dylib
          otool -L AcademiaAudit.dylib

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AcademiaAudit-dylib
          path: AcademiaAudit.dylib
          retention-days: 30
